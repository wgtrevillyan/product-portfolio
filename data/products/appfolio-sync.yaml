Description: |
  This key product offering uses scheduled CSV reports delivered via email to populate a property manager's maintenance management software with key property data from their accounting software. For property managers using the industry-leading accounting software Appfolio. The Appfolio Sync service automatically populates Property Meld, their maintenance management solution, with data stored in Appfolio. Specifically, all maintenance-related data associated with property owners, properties, units, and tenants are added and kept up-to-date in Property Meld via a daily data-sync service.

