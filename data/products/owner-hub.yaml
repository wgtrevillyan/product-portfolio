Description: |
  This web application equips property owners, whose properties are managed by a property management firm, with the ability to participate in the maintenance process for their properties. With the Owner Hub, property owners can approve or reject maintenance requests from tenants, chat with maintenance coordinators regarding ongoing maintenance activities, and view the historical maintenance records for each of their properties.

